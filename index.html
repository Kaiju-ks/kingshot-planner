<!DOCTYPE html>
<html>
<head>
  <title>Kingshot Planner</title>
  <style>
    body { margin:0; background:#0f172a; font-family:Arial; }

    #toolbar {
      position:fixed;
      top:15px;
      left:15px;
      background:#1e293b;
      padding:12px;
      border-radius:10px;
    }

    button, input {
      display:block;
      margin:5px 0;
      padding:6px 10px;
      border:none;
      border-radius:6px;
    }

    button { background:#334155; color:white; cursor:pointer; }
    .active { background:gold; color:black; }

    svg { width:100vw; height:100vh; cursor:crosshair; }

    text {
      fill:white;
      stroke:black;
      stroke-width:2;
      paint-order:stroke;
      font-size:11px;
      pointer-events:none;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="setTool('city')" id="cityBtn">City</button>
  <button onclick="setTool('mill')" id="millBtn">Mill</button>
  <button onclick="setTool('flag')" id="flagBtn">Flag</button>
  <button onclick="setTool('bear')" id="bearBtn">Bear Trap</button>

  <input id="labelInput" placeholder="Label...">

  <button onclick="saveLayout()">Save</button>
  <button onclick="loadLayout()">Load</button>
</div>

<svg id="canvas"></svg>

<script>
const svg = document.getElementById("canvas");
const gridSize = 30;

let currentTool = "city";
let selected = null;
let isDragging = false;

const counters = { city:1, mill:1, flag:1, bear:1 };

// TOOL
function setTool(tool){
  currentTool = tool;
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  document.getElementById(tool+"Btn").classList.add("active");
}
setTool("city");

// GRID
function drawGrid(){
  const half = gridSize/2;

  for(let row=-50; row<50; row++){
    for(let col=-50; col<50; col++){

      const x = col*gridSize + (row%2 ? half : 0);
      const y = row*half;

      const d = document.createElementNS("http://www.w3.org/2000/svg","polygon");

      d.setAttribute("points",`
        ${x},${y-half}
        ${x+half},${y}
        ${x},${y+half}
        ${x-half},${y}
      `);

      d.setAttribute("fill","none");
      d.setAttribute("stroke","#475569");
      d.setAttribute("stroke-width","1.2");

      svg.appendChild(d);
    }
  }
}
drawGrid();

// SNAP
function snap(x,y){
  const row = Math.round(y/(gridSize/2));
  const offset = row%2 ? gridSize/2 : 0;
  const col = Math.round((x-offset)/gridSize);

  return {
    x: col*gridSize + offset,
    y: row*(gridSize/2)
  };
}

// TILE
function drawTile(cx,cy,color){
  const h = gridSize/2;

  const p = document.createElementNS("http://www.w3.org/2000/svg","polygon");

  p.setAttribute("points",`
    ${cx},${cy-h}
    ${cx+h},${cy}
    ${cx},${cy+h}
    ${cx-h},${cy}
  `);

  p.setAttribute("fill",color);
  p.setAttribute("stroke","black");

  return p;
}

// BUILDING
function createBuilding(type,x,y,label){
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");

  // ✅ CITY / MILL (correct 2x2 diamond)
  if(type==="city"||type==="mill"){
    const color = type==="city" ? "#94a3b8" : "#facc15";

    const offsets = [
      {dx:0, dy:0},
      {dx:gridSize/2, dy:gridSize/2},
      {dx:-gridSize/2, dy:gridSize/2},
      {dx:0, dy:gridSize}
    ];

    offsets.forEach(o=>{
      g.appendChild(drawTile(x+o.dx,y+o.dy,color));
    });

  }

  // ✅ BEAR (3x3 diamond)
  else if(type==="bear"){

    const offsets=[
      {dx:0,dy:0},
      {dx:gridSize,dy:0},
      {dx:-gridSize,dy:0},
      {dx:gridSize/2,dy:gridSize/2},
      {dx:-gridSize/2,dy:gridSize/2},
      {dx:gridSize/2,dy:-gridSize/2},
      {dx:-gridSize/2,dy:-gridSize/2},
      {dx:0,dy:gridSize},
      {dx:0,dy:-gridSize}
    ];

    offsets.forEach(o=>{
      g.appendChild(drawTile(x+o.dx,y+o.dy,"#ef4444"));
    });

  }

  // ✅ FLAG (diamond range)
  else {

    // center tile
    g.appendChild(drawTile(x,y,"#22c55e"));

    const size = gridSize * 5;

    const diamond = document.createElementNS("http://www.w3.org/2000/svg","polygon");

    diamond.setAttribute("points", `
      ${x},${y - size/2}
      ${x + size/2},${y}
      ${x},${y + size/2}
      ${x - size/2},${y}
    `);

    diamond.setAttribute("fill", "#22c55e");
    diamond.setAttribute("opacity", "0.12");
    diamond.setAttribute("stroke", "#22c55e");
    diamond.setAttribute("stroke-width", "2");

    g.insertBefore(diamond, g.firstChild);
  }

  // LABEL
  const t = document.createElementNS("http://www.w3.org/2000/svg","text");
  t.setAttribute("x",x);
  t.setAttribute("y",y);
  t.setAttribute("text-anchor","middle");
  t.setAttribute("dominant-baseline","middle");

  let input=document.getElementById("labelInput").value;
  t.textContent = input || `${type} ${counters[type]++}`;

  g.appendChild(t);

  g.dataset.cx=x;
  g.dataset.cy=y;

  // DRAG
  g.addEventListener("mousedown",e=>{
    selected=g;
    isDragging=true;
    e.stopPropagation();
  });

  svg.appendChild(g);
}

// PLACE
svg.addEventListener("click",e=>{
  if(selected||isDragging)return;

  const rect=svg.getBoundingClientRect();
  const pos=snap(e.clientX-rect.left,e.clientY-rect.top);

  createBuilding(currentTool,pos.x,pos.y);
});

// DRAG
svg.addEventListener("mousemove",e=>{
  if(!selected)return;

  const rect=svg.getBoundingClientRect();
  const pos=snap(e.clientX-rect.left,e.clientY-rect.top);

  const dx=pos.x-selected.dataset.cx;
  const dy=pos.y-selected.dataset.cy;

  selected.querySelectorAll("polygon").forEach(el=>{
    const pts=el.getAttribute("points").split(" ").map(pt=>{
      let [px,py]=pt.split(",").map(Number);
      return `${px+dx},${py+dy}`;
    }).join(" ");
    el.setAttribute("points",pts);
  });

  const t=selected.querySelector("text");
  t.setAttribute("x",pos.x);
  t.setAttribute("y",pos.y);

  selected.dataset.cx=pos.x;
  selected.dataset.cy=pos.y;
});

svg.addEventListener("mouseup",()=>{
  selected=null;
  setTimeout(()=>isDragging=false,50);
});

// SAVE/LOAD
function saveLayout(){
  const data=[];
  document.querySelectorAll("svg g").forEach(g=>{
    const t=g.querySelector("text");
    data.push({
      x:t.getAttribute("x"),
      y:t.getAttribute("y"),
      label:t.textContent
    });
  });
  localStorage.setItem("layout",JSON.stringify(data));
}

function loadLayout(){
  const data=JSON.parse(localStorage.getItem("layout")||"[]");
  document.querySelectorAll("svg g").forEach(g=>g.remove());
  data.forEach(d=>{
    createBuilding(currentTool,+d.x,+d.y,d.label);
  });
}
</script>

</body>
</html>
