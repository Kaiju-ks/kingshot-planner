<!DOCTYPE html>
<html>
<head>
  <title>Kingshot Planner</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: Arial;
      color: white;
    }

    #toolbar {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      z-index: 10;
    }

    button, input {
      display: block;
      margin: 5px 0;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #334155;
      color: white;
      cursor: pointer;
    }

    .active {
      background: gold;
      color: black;
    }

    svg {
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    text {
      fill: white;
      stroke: black;
      stroke-width: 2;
      paint-order: stroke;
      font-size: 11px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="setTool('city')" id="cityBtn">City</button>
  <button onclick="setTool('mill')" id="millBtn">Mill</button>
  <button onclick="setTool('flag')" id="flagBtn">Flag</button>
  <button onclick="setTool('bear')" id="bearBtn">Bear Trap</button>

  <input type="text" id="labelInput" placeholder="Label..." />

  <button onclick="saveLayout()">Save Layout</button>
  <button onclick="loadLayout()">Load Layout</button>
</div>

<svg id="canvas"></svg>

<script>
const svg = document.getElementById("canvas");
const gridSize = 30;

const counters = { city:1, mill:1, flag:1, bear:1 };

let currentTool = "city";
let selected = null;
let isDragging = false;

function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  document.getElementById(tool + "Btn").classList.add("active");
}
setTool("city");

// 🔷 TRUE DIAMOND GRID
function drawGrid() {
  const half = gridSize / 2;

  for (let row = -50; row < 50; row++) {
    for (let col = -50; col < 50; col++) {

      const x = col * gridSize + (row % 2 ? half : 0);
      const y = row * half;

      const diamond = document.createElementNS("http://www.w3.org/2000/svg", "polygon");

      diamond.setAttribute("points", `
        ${x},${y - half}
        ${x + half},${y}
        ${x},${y + half}
        ${x - half},${y}
      `);

      diamond.setAttribute("fill", "none");
      diamond.setAttribute("stroke", "#475569");
      diamond.setAttribute("stroke-width", "1.2");

      svg.appendChild(diamond);
    }
  }
}
drawGrid();

// 🧲 SNAP
function snap(x, y) {
  const row = Math.round(y / (gridSize / 2));
  const offset = row % 2 ? gridSize / 2 : 0;
  const col = Math.round((x - offset) / gridSize);

  return {
    x: col * gridSize + offset,
    y: row * (gridSize / 2)
  };
}

// 🧱 DRAW TILE
function drawTile(cx, cy, color) {
  const half = gridSize / 2;

  const tile = document.createElementNS("http://www.w3.org/2000/svg", "polygon");

  tile.setAttribute("points", `
    ${cx},${cy - half}
    ${cx + half},${cy}
    ${cx},${cy + half}
    ${cx - half},${cy}
  `);

  tile.setAttribute("fill", color);
  tile.setAttribute("stroke", "black");

  return tile;
}

// 🏗️ CREATE BUILDING
function createBuilding(type, x, y, label) {
  const group = document.createElementNS("http://www.w3.org/2000/svg", "g");

  if (type === "city" || type === "mill") {
    const offsets = [
  { dx: 0, dy: 0 },
  { dx: gridSize/2, dy: gridSize/2 },
  { dx: -gridSize/2, dy: gridSize/2 },
  { dx: 0, dy: gridSize }
];
    ];

    offsets.forEach(o => {
      group.appendChild(drawTile(x + o.dx, y + o.dy, type === "city" ? "#94a3b8" : "#facc15"));
    });

  } else if (type === "bear") {
    const offsets = [
      { dx: 0, dy: 0 },
      { dx: gridSize, dy: 0 },
      { dx: -gridSize, dy: 0 },
      { dx: gridSize/2, dy: gridSize/2 },
      { dx: -gridSize/2, dy: gridSize/2 },
      { dx: gridSize/2, dy: -gridSize/2 },
      { dx: -gridSize/2, dy: -gridSize/2 }
    ];

    offsets.forEach(o => {
      group.appendChild(drawTile(x + o.dx, y + o.dy, "#ef4444"));
    });

  } else {
    group.appendChild(drawTile(x, y, "#22c55e"));
  }

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.setAttribute("text-anchor", "middle");
  text.setAttribute("dominant-baseline", "middle");
  text.textContent = label;

  group.appendChild(text);

  group.dataset.cx = x;
  group.dataset.cy = y;

  group.addEventListener("mousedown", (e) => {
    selected = group;
    isDragging = true;
    e.stopPropagation();
  });

  group.addEventListener("dblclick", () => {
    const newLabel = prompt("Edit label:", text.textContent);
    if (newLabel !== null) text.textContent = newLabel;
  });

  svg.appendChild(group);
}

// PLACE
svg.addEventListener("click", (e) => {
  if (selected || isDragging) return;

  const rect = svg.getBoundingClientRect();
  const pos = snap(e.clientX - rect.left, e.clientY - rect.top);

  let input = document.getElementById("labelInput").value;
  let label = input.trim() || `${currentTool} ${counters[currentTool]++}`;

  createBuilding(currentTool, pos.x, pos.y, label);
});

// DRAG
svg.addEventListener("mousemove", (e) => {
  if (!selected) return;

  const rect = svg.getBoundingClientRect();
  const pos = snap(e.clientX - rect.left, e.clientY - rect.top);

  const dx = pos.x - selected.dataset.cx;
  const dy = pos.y - selected.dataset.cy;

  selected.querySelectorAll("polygon").forEach(p => {
    const pts = p.getAttribute("points")
      .split(" ")
      .map(pt => {
        let [px, py] = pt.split(",").map(Number);
        return `${px + dx},${py + dy}`;
      }).join(" ");

    p.setAttribute("points", pts);
  });

  const text = selected.querySelector("text");
  text.setAttribute("x", pos.x);
  text.setAttribute("y", pos.y);

  selected.dataset.cx = pos.x;
  selected.dataset.cy = pos.y;
});

svg.addEventListener("mouseup", () => {
  selected = null;
  setTimeout(() => isDragging = false, 50);
});

// SAVE / LOAD
function saveLayout() {
  const data = [];
  document.querySelectorAll("svg g").forEach(g => {
    const t = g.querySelector("text");
    data.push({
      x: t.getAttribute("x"),
      y: t.getAttribute("y"),
      label: t.textContent
    });
  });
  localStorage.setItem("layout", JSON.stringify(data));
}

function loadLayout() {
  const data = JSON.parse(localStorage.getItem("layout") || "[]");
  document.querySelectorAll("svg g").forEach(g => g.remove());
  data.forEach(d => createBuilding(currentTool, +d.x, +d.y, d.label));
}
</script>

</body>
</html>
