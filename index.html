<!DOCTYPE html>
<html>
<head>
  <title>Kingshot Planner (Diamond Perfect)</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: Arial;
      color: white;
    }

    #toolbar {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      z-index: 10;
    }

    button, input {
      display: block;
      margin: 5px 0;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #334155;
      color: white;
      cursor: pointer;
    }

    .active {
      background: gold;
      color: black;
    }

    svg {
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    text {
      fill: white;
      stroke: black;
      stroke-width: 2;
      paint-order: stroke;
      font-size: 11px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="setTool('city')" id="cityBtn">City</button>
  <button onclick="setTool('mill')" id="millBtn">Mill</button>
  <button onclick="setTool('flag')" id="flagBtn">Flag</button>
  <button onclick="setTool('bear')" id="bearBtn">Bear Trap</button>

  <input type="text" id="labelInput" placeholder="Label..." />

  <button onclick="saveLayout()">Save Layout</button>
  <button onclick="loadLayout()">Load Layout</button>
</div>

<svg id="canvas"></svg>

<script>
const svg = document.getElementById("canvas");
const gridSize = 30;

// counters
const counters = { city:1, mill:1, flag:1, bear:1 };

// 🔷 DRAW GRID (CENTER BASED)
function drawGrid() {
  const width = window.innerWidth;
  const height = window.innerHeight;

  const halfW = gridSize / 2;
  const halfH = gridSize / 2;

  for (let row = -50; row < 50; row++) {
    for (let col = -50; col < 50; col++) {

      const x = col * gridSize + (row % 2 === 0 ? 0 : halfW);
      const y = row * halfH;

      const diamond = document.createElementNS("http://www.w3.org/2000/svg", "polygon");

      diamond.setAttribute("points", `
        ${x},${y - halfH}
        ${x + halfW},${y}
        ${x},${y + halfH}
        ${x - halfW},${y}
      `);

      diamond.setAttribute("fill", "none");
      diamond.setAttribute("stroke", "#475569");
      diamond.setAttribute("stroke-width", "1.2");

      svg.appendChild(diamond);
    }
  }
}
drawGrid();

// building sizes
const buildingTypes = {
  city: { size: gridSize * 2, color: "#94a3b8" },
  mill: { size: gridSize * 2, color: "#facc15" },
  flag: { size: gridSize, color: "#22c55e" },
  bear: { size: gridSize * 3, color: "#ef4444" }
};

let currentTool = "city";
let selected = null;
let isDragging = false;

function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  document.getElementById(tool + "Btn").classList.add("active");
}
setTool("city");

// 🧲 SNAP TO CENTER
function snap(x, y) {
  const row = Math.round(y / (gridSize / 2));
  const offset = row % 2 === 0 ? 0 : gridSize / 2;

  const col = Math.round((x - offset) / gridSize);

  return {
    x: col * gridSize + offset,
    y: row * (gridSize / 2)
  };
}
// PLACE
svg.addEventListener("click", (e) => {
  if (selected || isDragging) return;

  const rect = svg.getBoundingClientRect();
  const rawX = e.clientX - rect.left;
  const rawY = e.clientY - rect.top;

  const pos = snap(rawX, rawY);

  let input = document.getElementById("labelInput").value;
  let label = input.trim() !== "" ? input :
    `${currentTool.charAt(0).toUpperCase()+currentTool.slice(1)} ${counters[currentTool]++}`;

  createBuilding(currentTool, pos.x, pos.y, label);
});

function createBuilding(typeName, x, y, labelText) {
  const type = buildingTypes[typeName];

  const group = document.createElementNS("http://www.w3.org/2000/svg", "g");

  // FLAG RANGE
  if (typeName === "flag") {
    const range = document.createElementNS("http://www.w3.org/2000/svg", "polygon");

    range.setAttribute("points", `
      ${x},${y - gridSize*1.5}
      ${x + gridSize*1.5},${y}
      ${x},${y + gridSize*1.5}
      ${x - gridSize*1.5},${y}
    `);

    range.setAttribute("fill", "#22c55e33");
    range.setAttribute("stroke", "#22c55e");

    svg.appendChild(range);
  }

  // DIAMOND SHAPE (CENTERED)
  const diamond = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
  const half = type.size / 2;

  diamond.setAttribute("points", `
    ${x},${y - half}
    ${x + half},${y}
    ${x},${y + half}
    ${x - half},${y}
  `);

  diamond.setAttribute("fill", type.color);
  diamond.setAttribute("stroke", "black");

  group.appendChild(diamond);

  // LABEL CENTER
  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.setAttribute("text-anchor", "middle");
  text.setAttribute("dominant-baseline", "middle");
  text.textContent = labelText;

  group.appendChild(text);

  // DRAG
  group.addEventListener("mousedown", (e) => {
    selected = group;
    isDragging = true;
    e.stopPropagation();
  });

  group.addEventListener("dblclick", () => {
    const newLabel = prompt("Edit label:", text.textContent);
    if (newLabel !== null) text.textContent = newLabel;
  });

  svg.appendChild(group);
}

// DRAG MOVE
svg.addEventListener("mousemove", (e) => {
  if (!selected) return;

  const rect = svg.getBoundingClientRect();
  const pos = snap(e.clientX - rect.left, e.clientY - rect.top);

  const poly = selected.querySelector("polygon");
  const text = selected.querySelector("text");

  const half = (poly.getBBox().width) / 2;

  poly.setAttribute("points", `
    ${pos.x},${pos.y - half}
    ${pos.x + half},${pos.y}
    ${pos.x},${pos.y + half}
    ${pos.x - half},${pos.y}
  `);

  text.setAttribute("x", pos.x);
  text.setAttribute("y", pos.y);
});

svg.addEventListener("mouseup", () => {
  selected = null;
  setTimeout(() => isDragging = false, 50);
});

// SAVE
function saveLayout() {
  const data = [];

  document.querySelectorAll("svg g").forEach(g => {
    const text = g.querySelector("text");
    data.push({
      x: parseFloat(text.getAttribute("x")),
      y: parseFloat(text.getAttribute("y")),
      label: text.textContent
    });
  });

  localStorage.setItem("layout", JSON.stringify(data));
  alert("Saved!");
}

// LOAD
function loadLayout() {
  const data = JSON.parse(localStorage.getItem("layout") || "[]");

  document.querySelectorAll("svg g").forEach(g => g.remove());

  data.forEach(d => {
    createBuilding(currentTool, d.x, d.y, d.label);
  });
}
</script>

</body>
</html>
