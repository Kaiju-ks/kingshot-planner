<!DOCTYPE html>
<html>
<head>
  <title>Kingshot Planner (Diamond Grid)</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: Arial;
      color: white;
    }

    #toolbar {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      z-index: 10;
    }

    button, input {
      display: block;
      margin: 5px 0;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #334155;
      color: white;
      cursor: pointer;
    }

    .active {
      background: gold;
      color: black;
    }

    svg {
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    text {
      fill: white;
      stroke: black;
      stroke-width: 2;
      paint-order: stroke;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="setTool('city')" id="cityBtn">City</button>
  <button onclick="setTool('mill')" id="millBtn">Mill</button>
  <button onclick="setTool('flag')" id="flagBtn">Flag</button>
  <button onclick="setTool('bear')" id="bearBtn">Bear Trap</button>

  <input type="text" id="labelInput" placeholder="Label..." />
  <input type="file" id="mapUpload" accept="image/*" />

  <button onclick="saveLayout()">Save Layout</button>
  <button onclick="loadLayout()">Load Layout</button>
</div>

<svg id="canvas"></svg>

<script>
const svg = document.getElementById("canvas");
const gridSize = 30;

// 🔢 COUNTERS
const counters = {
  city: 1,
  mill: 1,
  flag: 1,
  bear: 1
};

// 🔷 DIAMOND GRID (true)
function drawGrid() {
  const width = window.innerWidth;
  const height = window.innerHeight;

  const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");

  for (let x = -gridSize; x < width + gridSize; x += gridSize) {
    for (let y = -gridSize; y < height + gridSize; y += gridSize) {

      const diamond = document.createElementNS("http://www.w3.org/2000/svg", "polygon");

      diamond.setAttribute("points", `
        ${x},${y - gridSize/2}
        ${x + gridSize/2},${y}
        ${x},${y + gridSize/2}
        ${x - gridSize/2},${y}
      `);

      diamond.setAttribute("fill", "none");
      diamond.setAttribute("stroke", "#1e293b");

      gridGroup.appendChild(diamond);
    }
  }

  svg.appendChild(gridGroup);
}
drawGrid();

// 🧱 BUILDINGS
const buildingTypes = {
  city: { size: gridSize * 2, color: "#94a3b8" },
  mill: { size: gridSize * 2, color: "#facc15" },
  flag: { size: gridSize, color: "#22c55e" },
  bear: { size: gridSize * 3, color: "#ef4444" }
};

let currentTool = "city";
let selected = null;
let isDragging = false;

// TOOL SELECT
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  document.getElementById(tool + "Btn").classList.add("active");
}
setTool("city");

// PLACE
svg.addEventListener("click", (e) => {
  if (selected || isDragging) return;

  const rect = svg.getBoundingClientRect();
  const rawX = e.clientX - rect.left;
  const rawY = e.clientY - rect.top;

  const x = Math.floor(rawX / gridSize) * gridSize + gridSize / 2;
  const y = Math.floor(rawY / gridSize) * gridSize + gridSize / 2;

  let inputLabel = document.getElementById("labelInput").value;

  let label;
  if (inputLabel.trim() !== "") {
    label = inputLabel;
  } else {
    const names = { city: "City", mill: "Mill", flag: "Flag", bear: "Bear" };
    label = `${names[currentTool]} ${counters[currentTool]++}`;
  }

  createBuilding(currentTool, x, y, label);
});

function createBuilding(typeName, x, y, labelText) {
  const type = buildingTypes[typeName];

  const group = document.createElementNS("http://www.w3.org/2000/svg", "g");

  // FLAG RANGE
  if (typeName === "flag") {
    const range = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    range.setAttribute("x", -gridSize);
    range.setAttribute("y", -gridSize);
    range.setAttribute("width", gridSize * 3);
    range.setAttribute("height", gridSize * 3);
    range.setAttribute("fill", "#22c55e33");
    range.setAttribute("stroke", "#22c55e");
    range.setAttribute("stroke-dasharray", "4");
    group.appendChild(range);
  }

  // MAIN SHAPE
const diamond = document.createElementNS("http://www.w3.org/2000/svg", "polygon");

const half = type.size / 2;

diamond.setAttribute("points", `
  ${half},0
  ${type.size},${half}
  ${half},${type.size}
  0,${half}
`);

diamond.setAttribute("fill", type.color);
diamond.setAttribute("stroke", "black");

group.appendChild(diamond);

  // LABEL CENTERED
  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", type.size / 2);
  text.setAttribute("y", type.size / 2);
  text.setAttribute("text-anchor", "middle");
  text.setAttribute("dominant-baseline", "middle");
  text.textContent = labelText;

  group.appendChild(text);

  group.setAttribute("transform", `translate(${x},${y})`);

  // DRAG
  group.addEventListener("mousedown", (e) => {
    selected = group;
    isDragging = true;
    e.stopPropagation();
  });

  // EDIT LABEL
  group.addEventListener("dblclick", () => {
    const newLabel = prompt("Edit label:", text.textContent);
    if (newLabel !== null) text.textContent = newLabel;
  });

  svg.appendChild(group);
}

// DRAG SNAP
svg.addEventListener("mousemove", (e) => {
  if (!selected) return;

  const rect = svg.getBoundingClientRect();
  const rawX = e.clientX - rect.left;
  const rawY = e.clientY - rect.top;

  const x = Math.floor(rawX / gridSize) * gridSize;
  const y = Math.floor(rawY / gridSize) * gridSize;

  selected.setAttribute("transform", `translate(${x},${y})`);
});

svg.addEventListener("mouseup", () => {
  selected = null;
  setTimeout(() => isDragging = false, 50);
});

// SAVE
function saveLayout() {
  const data = [];

  document.querySelectorAll("svg g").forEach(group => {
    const transform = group.getAttribute("transform");
    const match = transform.match(/translate\((.*),(.*)\)/);

    const x = parseFloat(match[1]);
    const y = parseFloat(match[2]);
    const label = group.querySelector("text").textContent;

    data.push({ x, y, label });
  });

  localStorage.setItem("layout", JSON.stringify(data));
  alert("Saved!");
}

// LOAD
function loadLayout() {
  const data = JSON.parse(localStorage.getItem("layout") || "[]");

  document.querySelectorAll("svg g").forEach(g => g.remove());

  data.forEach(d => {
    createBuilding(currentTool, d.x, d.y, d.label);
  });
}

// MAP UPLOAD
document.getElementById("mapUpload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(evt) {
    let img = document.getElementById("bg");
    if (!img) {
      img = document.createElementNS("http://www.w3.org/2000/svg", "image");
      img.setAttribute("id", "bg");
      img.setAttribute("width", "100%");
      img.setAttribute("height", "100%");
      svg.prepend(img);
    }
    img.setAttributeNS("http://www.w3.org/1999/xlink", "href", evt.target.result);
  };
  reader.readAsDataURL(file);
});
</script>

</body>
</html>
