<!DOCTYPE html>
<html>
<head>
  <title>Kingshot Planner Pro+</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: Arial;
      color: white;
    }

    #toolbar {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      z-index: 10;
    }

    button, input {
      display: block;
      margin: 5px 0;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #334155;
      color: white;
      cursor: pointer;
    }

    .active {
      background: gold;
      color: black;
    }

    svg {
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    text {
      fill: white;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="setTool('city')" id="cityBtn">City</button>
  <button onclick="setTool('mill')" id="millBtn">Mill</button>
  <button onclick="setTool('flag')" id="flagBtn">Flag</button>
  <button onclick="setTool('bear')" id="bearBtn">Bear Trap</button>

  <input type="text" id="labelInput" placeholder="Label..." />
  <input type="file" id="mapUpload" accept="image/*" />

  <button onclick="saveLayout()">Save Layout</button>
  <button onclick="loadLayout()">Load Layout</button>
</div>

<svg id="canvas"></svg>

<script>
const svg = document.getElementById("canvas");
const gridSize = 20;

// 🟦 DRAW GRID
function drawGrid() {
  const width = window.innerWidth;
  const height = window.innerHeight;

  const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");

  for (let x = 0; x < width; x += gridSize) {
    let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x);
    line.setAttribute("y1", 0);
    line.setAttribute("x2", x);
    line.setAttribute("y2", height);
    line.setAttribute("stroke", "#1e293b");
    svg.appendChild(line);
  }

  for (let y = 0; y < height; y += gridSize) {
    let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", 0);
    line.setAttribute("y1", y);
    line.setAttribute("x2", width);
    line.setAttribute("y2", y);
    line.setAttribute("stroke", "#1e293b");
    svg.appendChild(line);
  }
}
drawGrid();

// 🧱 BUILDING TYPES
const buildingTypes = {
  city: { size: gridSize * 2, color: "#94a3b8" },
  mill: { size: gridSize * 2, color: "#facc15" },
  flag: { size: gridSize * 1, color: "#22c55e" },
  bear: { size: gridSize * 3, color: "#ef4444" }
};

let currentTool = "city";
let selected = null;
let offsetX = 0;
let offsetY = 0;

// 🔘 TOOL SWITCH
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  document.getElementById(tool + "Btn").classList.add("active");
}
setTool("city");

// 🏗️ CREATE BUILDING
svg.addEventListener("click", (e) => {
  if (selected) return;

  const rect = svg.getBoundingClientRect();
  const rawX = e.clientX - rect.left;
  const rawY = e.clientY - rect.top;

  const x = Math.round(rawX / gridSize) * gridSize;
  const y = Math.round(rawY / gridSize) * gridSize;

  const type = buildingTypes[currentTool];
  const labelText = document.getElementById("labelInput").value;

  const group = document.createElementNS("http://www.w3.org/2000/svg", "g");

  // FLAG RANGE (3x3)
  if (currentTool === "flag") {
    const range = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    range.setAttribute("x", -gridSize * 1.5);
    range.setAttribute("y", -gridSize * 1.5);
    range.setAttribute("width", gridSize * 3);
    range.setAttribute("height", gridSize * 3);
    range.setAttribute("fill", "#22c55e33");
    range.setAttribute("stroke", "#22c55e");
    range.setAttribute("stroke-dasharray", "4");
    group.appendChild(range);
  }

  // MAIN BUILDING
  const rectEl = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  rectEl.setAttribute("x", -type.size / 2);
  rectEl.setAttribute("y", -type.size / 2);
  rectEl.setAttribute("width", type.size);
  rectEl.setAttribute("height", type.size);
  rectEl.setAttribute("fill", type.color);
  rectEl.setAttribute("stroke", "black");

  group.appendChild(rectEl);

  // LABEL
  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("y", type.size / 2 + 15);
  text.setAttribute("text-anchor", "middle");
  text.textContent = labelText;

  group.appendChild(text);
  group.setAttribute("transform", `translate(${x},${y})`);

  // DRAG
  group.addEventListener("mousedown", (e) => {
    selected = group;
    offsetX = e.clientX;
    offsetY = e.clientY;
    e.stopPropagation();
  });

  // EDIT LABEL
  group.addEventListener("dblclick", () => {
    const newLabel = prompt("Edit label:", text.textContent);
    if (newLabel !== null) text.textContent = newLabel;
  });

  svg.appendChild(group);
});

// 🖱️ DRAG MOVE
svg.addEventListener("mousemove", (e) => {
  if (!selected) return;

  const dx = e.clientX - offsetX;
  const dy = e.clientY - offsetY;

  const transform = selected.getAttribute("transform");
  const match = transform.match(/translate\((.*),(.*)\)/);

  let x = parseFloat(match[1]) + dx;
  let y = parseFloat(match[2]) + dy;

  selected.setAttribute("transform", `translate(${x},${y})`);

  offsetX = e.clientX;
  offsetY = e.clientY;
});

svg.addEventListener("mouseup", () => selected = null);

// 💾 SAVE
function saveLayout() {
  const data = [];

  document.querySelectorAll("svg g").forEach(group => {
    const transform = group.getAttribute("transform");
    const match = transform.match(/translate\((.*),(.*)\)/);

    const x = parseFloat(match[1]);
    const y = parseFloat(match[2]);
    const label = group.querySelector("text").textContent;

    data.push({ x, y, label });
  });

  localStorage.setItem("layout", JSON.stringify(data));
  alert("Saved!");
}

// 📂 LOAD
function loadLayout() {
  const data = JSON.parse(localStorage.getItem("layout") || "[]");

  document.querySelectorAll("svg g").forEach(g => g.remove());

  data.forEach(d => {
    document.getElementById("labelInput").value = d.label;
    createFakeClick(d.x, d.y);
  });
}

// helper
function createFakeClick(x, y) {
  createEvent = new MouseEvent("click", {
    clientX: x,
    clientY: y
  });
  svg.dispatchEvent(createEvent);
}

// 🗺️ MAP UPLOAD
document.getElementById("mapUpload").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(evt) {
    let img = document.getElementById("bg");
    if (!img) {
      img = document.createElementNS("http://www.w3.org/2000/svg", "image");
      img.setAttribute("id", "bg");
      img.setAttribute("width", "100%");
      img.setAttribute("height", "100%");
      svg.prepend(img);
    }
    img.setAttributeNS("http://www.w3.org/1999/xlink", "href", evt.target.result);
  };
  reader.readAsDataURL(file);
});
</script>

</body>
</html>
